[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "Udeshya"

[[params.social]]
    name = "Github"
    icon = "fa fa-github"
    weight = 1
    url = "https://github.com/UdeshyaDhungana/"
[[params.social]]
    name = "Twitter"
    icon = "fa fa-twitter"
    weight = 3
    url = "https://twitter.com/Udeshya_D/"
[[params.social]]
    name = "Instagram"
    icon = "fa fa-instagram"
    weight = 3
    url = "https://instagram.com/d_ude95"
[[params.social]]
    name = "RSS"
    icon = "fa fa-rss"
    weight = 6
    url = "https://udeshyadhungana.com.np/index.xml"
    rel = "alternate"
    type = "application/rss+xml"


[languages]
    [languages.en]
        languagename = "English"

        [languages.en.menu]

            [[languages.en.menu.main]]
            name = "About"
            weight = 2
            url = "about/"

            [[languages.en.menu.main]]
            name = "Articles"
            weight = 1
            url = "articles/"
