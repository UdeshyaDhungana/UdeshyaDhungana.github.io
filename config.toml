baseurl = "http://www.example.com"
title = "Udeshya"

theme = "hugo-coder"

languagecode = "en"
defaultcontentlanguage = "en"

paginate = 10

pygmentsstyle = "b2"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true


#Comments settings
[params.utterances]
  enable = true
  repo = "UdeshyaDhungana/UdeshyaDhungana.github.io" # https://utteranc.es/#heading-repository
  issueTerm = "pathname" # https://utteranc.es/#heading-mapping
  label = "Comment" # https://utteranc.es/#heading-issue-label
  theme = "preferred-color-scheme" # https://utteranc.es/#heading-theme

[params]
    author = "Udeshya Dhungana"
    description = "My blog - to share my knowledge"
    keywords = "blog,article,personal"
    info = "Programmer with passion for Mathematics"
    avatarurl = "/images/avatar.jpg"
    #gravatar = "john.doe@example.com"
    footercontent = "Happy happy, Joy joy"

    favicon_32 = "/images/favicon.ico"
    dateformat = "January 2, 2006"

    hideFooter = false
    hideCredits = true
    hideCopyright = false
    since = 2020

    # Git Commit in Footer, uncomment the line below to enable it.
    #commit = "https://github.com/luizdepra/hugo-coder/tree/"

    rtl = false

    # Specify light/dark colorscheme
    # Supported values:
    # "auto" (use preference set by browser)
    # "dark" (dark background, light foreground)
    # "light" (light background, dark foreground) (default)
    colorscheme = "light"

    # Hide the toggle button, along with the associated vertical divider
    hidecolorschemetoggle = true

    # Series see also post count
    maxSeeAlsoItems = 5

    # Enable Twemoji
    enableTwemoji = true

    # Custom CSS
    customCSS = []

    # Custom SCSS
    customSCSS = []

    # Custom JS
    customJS = []

[taxonomies]
  category = "categories"
  tag = "tags"

[[params.social]]
    name = "Github"
    icon = "fa fa-github"
    weight = 1
    url = "https://github.com/UdeshyaDhungana/"
[[params.social]]
    name = "Twitter"
    icon = "fa fa-twitter"
    weight = 2
    url = "https://twitter.com/Udeshya_D/"
[[params.social]]
    name = "Instagram"
    icon = "fa fa-instagram"
    weight = 3
    url = "https://instagram.com/d_ude95"
[[params.social]]
    name = "RSS"
    icon = "fa fa-rss"
    weight = 6
    url = "https://udeshyadhungana.com.np/index.xml"
    rel = "alternate"
    type = "application/rss+xml"


[languages]
    [languages.en]
        languagename = "English"

        [languages.en.menu]

            [[languages.en.menu.main]]
            name = "About"
            weight = 2
            url = "about/"

            [[languages.en.menu.main]]
            name = "Articles"
            weight = 1
            url = "posts/"

            [[languages.en.menu.main]]
            name = "Programs I use"
            weight = 1
            url = "programs/"
